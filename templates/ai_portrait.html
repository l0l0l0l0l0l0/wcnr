<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重点人管控系统 - AI画像</title>
  <link rel="stylesheet" href="/static/css/font-awesome.min.css">
  <link rel="stylesheet" href="/static/css/shared.css">
  <script src="/static/js/auth.js"></script>
  <style>
    .ai-layout {
      display: flex;
      gap: 12px;
      height: calc(100vh - 80px);
    }
    .ai-sidebar.panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ai-main.panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ai-search-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
    }
    .ai-search-bar .filter-input {
      flex: 1;
    }
    .person-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      min-height: 0;
    }
    .person-card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .person-card:hover {
      border-color: var(--gov-blue-light);
      box-shadow: var(--shadow);
    }
    .person-card.active {
      border-color: var(--gov-blue-light);
      background: var(--blue-light);
    }
    .person-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gov-blue-light), #3b82f6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .person-info {
      flex: 1;
      min-width: 0;
    }
    .person-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .person-meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .person-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 100px;
      font-weight: 600;
    }
    .person-tag.red { background: var(--red-light); color: var(--red); }
    .person-tag.orange { background: var(--orange-light); color: var(--orange); }
    .person-tag.green { background: var(--green-light); color: var(--green); }
    .person-tag.blue { background: var(--blue-light); color: var(--blue); }

    .analysis-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
      padding: 40px;
      min-height: 0;
    }
    .analysis-placeholder i {
      font-size: 48px;
      color: var(--border);
    }

    .analysis-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      min-height: 0;
    }
    .analysis-loading i {
      font-size: 32px;
      color: var(--gov-blue-light);
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ===== Archive Styles ===== */
    .archive-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      min-height: 0;
    }

    .archive-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .archive-header-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gov-blue-light), #3b82f6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .archive-header-info h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .archive-header-meta {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .archive-section {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .archive-section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gov-blue);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .archive-section-title i {
      font-size: 14px;
      color: var(--gov-blue-light);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px 24px;
    }
    .info-item {
      display: flex;
      gap: 6px;
      font-size: 13px;
      line-height: 1.6;
    }
    .info-label {
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 80px;
    }
    .info-value {
      color: var(--text);
      font-weight: 500;
    }

    .guardian-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .guardian-card {
      flex: 1;
      min-width: 260px;
      background: #fafbfc;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .guardian-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gov-blue);
      margin-bottom: 10px;
    }
    .guardian-card .info-item {
      margin-bottom: 4px;
    }

    .alert-feedback-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .alert-feedback-item {
      background: #fafbfc;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .alert-feedback-time {
      font-size: 13px;
      font-weight: 700;
      color: var(--gov-blue);
      margin-bottom: 8px;
    }
    .alert-feedback-row {
      display: flex;
      gap: 6px;
      font-size: 13px;
      line-height: 1.7;
    }
    .alert-feedback-row .label {
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 48px;
    }
    .alert-feedback-row .value {
      color: var(--text);
    }

    .report-section {
      margin-bottom: 18px;
    }
    .report-section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .report-section-title i {
      font-size: 12px;
      color: var(--gov-blue-light);
    }
    .report-section-body {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text-secondary);
      background: #fafbfc;
      border-radius: var(--radius);
      padding: 14px 16px;
      white-space: pre-wrap;
    }

    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
    }
    .risk-badge.high { background: var(--red-light); color: var(--red); }
    .risk-badge.medium { background: var(--orange-light); color: var(--orange); }
    .risk-badge.low { background: var(--green-light); color: var(--green); }

    .sidebar-pagination {
      padding: 10px 12px;
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: center;
    }

    @media (max-width: 992px) {
      .ai-layout {
        flex-direction: column;
        height: auto;
      }
      .ai-sidebar.panel {
        width: 100%;
        max-height: 50vh;
      }
      .ai-main.panel {
        min-height: 50vh;
      }
    }
  </style>
</head>
<body data-page="ai_portrait">

  <header class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon"><img src="/static/img/1.png" alt="logo"></div>
        <div class="logo-text">重点人管控</div>
      </div>
      <nav class="nav-menu" id="topNav">
        <a class="nav-item" data-nav="control" href="/control"><i class="fas fa-bullhorn"></i>布控管理</a>
        <a class="nav-item" data-nav="alert" href="/"><i class="fas fa-star" style="color:#facc15;"></i>预警中心</a>
        <a class="nav-item" data-nav="report" href="/report"><i class="fas fa-chart-bar"></i>统计报表</a>
        <a class="nav-item active" data-nav="ai_portrait" href="/ai-portrait"><i class="fas fa-robot"></i>AI画像</a>
        <a class="nav-item" data-nav="archive_report" href="/archive-report"><i class="fas fa-file-alt"></i>AI档案</a>
        <a class="nav-item" id="navUsers" href="/users" style="display:none"><i class="fas fa-users-cog"></i>用户管理</a>
      </nav>
    </div>
    <div class="header-right">
      <div class="alert-badge">
        <i class="fas fa-bell" style="font-size:11px;"></i>
        <span>预警</span>
      </div>
      <div class="header-stat"><i class="fas fa-chart-bar" style="font-size:11px; color:rgba(255,255,255,0.6); margin-right:4px;"></i>今日总访问量: <span>125</span></div>
      <div class="header-stat">今日登录人数: <span>43</span></div>
      <div class="header-stat">在线人数: <span>28</span></div>
      <div class="user-menu" id="userMenu" style="position:relative;">
        <div class="user-avatar" onclick="toggleUserDropdown()"><i class="fas fa-user"></i></div>
        <div class="user-dropdown" id="userDropdown" style="display:none;position:absolute;right:0;top:44px;background:var(--white);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.12);min-width:180px;border:1px solid var(--border-light);z-index:1001;">
          <div style="padding:12px 16px;display:flex;flex-direction:column;gap:4px;">
            <span id="dropdownUsername" style="font-weight:600;color:var(--text);font-size:14px;">--</span>
            <span id="dropdownRole" style="font-size:11px;color:var(--gov-blue-light);font-weight:500;">--</span>
          </div>
          <div style="height:1px;background:var(--border-light);"></div>
          <a href="/settings" style="display:flex;align-items:center;gap:8px;padding:10px 16px;color:var(--text-secondary);cursor:pointer;font-size:13px;text-decoration:none;"><i class="fas fa-cog"></i>设置</a>
          <div style="height:1px;background:var(--border-light);"></div>
          <div onclick="Auth.logout()" style="display:flex;align-items:center;gap:8px;padding:10px 16px;color:var(--text-secondary);cursor:pointer;font-size:13px;"><i class="fas fa-sign-out-alt"></i>退出登录</div>
        </div>
      </div>
    </div>
  </header>

  <div class="main">
    <div class="ai-layout">
      <!-- 左侧：人员搜索与列表 -->
      <div class="ai-sidebar panel">
        <div class="ai-search-bar">
          <input class="filter-input" id="searchInput" placeholder="输入姓名或身份证号搜索..." onkeydown="if(event.key==='Enter')onSearch()">
          <button class="filter-btn btn-search" onclick="onSearch()"><i class="fas fa-search"></i>搜索</button>
        </div>
        <div class="person-list" id="personList">
          <div class="analysis-placeholder" style="padding:20px;">
            <i class="fas fa-users"></i>
            <span>请输入关键词搜索布控人员</span>
          </div>
        </div>
        <div class="sidebar-pagination" id="pagination"></div>
      </div>

      <!-- 右侧：AI 档案 -->
      <div class="ai-main panel" id="analysisPanel">
        <div class="analysis-placeholder">
          <i class="fas fa-robot"></i>
          <div style="text-align:center;">
            <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;">AI 智能档案</div>
            <div style="font-size:13px;">在左侧选择人员，即可查看AI档案与巡逻防范报告</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/shared.js"></script>
  <script src="/static/js/ai_portrait.js"></script>
</body>
</html>
