<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 重点人管控系统</title>
  <link rel="stylesheet" href="/static/css/font-awesome.min.css">
  <style>
    :root {
      --primary: #00d4ff;
      --primary-dim: rgba(0,212,255,0.15);
      --accent: #0ea5e9;
      --card-bg: rgba(8,20,40,0.85);
      --card-border: rgba(0,212,255,0.25);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --input-bg: rgba(15,30,55,0.8);
      --input-border: rgba(0,212,255,0.3);
      --radius: 8px;
      --glow: 0 0 20px rgba(0,212,255,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
      background: #050e1a;
    }

    /* === 动态背景 === */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
    }
    canvas#bgCanvas {
      display: block; width: 100%; height: 100%;
    }
    /* 扫描线 */
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.03) 2px,
        rgba(0,212,255,0.03) 4px
      );
      pointer-events: none;
    }
    /* 径向光晕 */
    .radial-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      top: -200px; left: -100px;
      background: radial-gradient(circle, rgba(0,212,255,0.35), transparent 70%);
      animation: glow-drift 12s ease-in-out infinite alternate;
    }
    .glow-2 {
      bottom: -250px; right: -150px;
      background: radial-gradient(circle, rgba(14,165,233,0.3), transparent 70%);
      animation: glow-drift 15s ease-in-out infinite alternate-reverse;
    }
    @keyframes glow-drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.15); }
    }

    /* === 登录卡片 === */
    .login-card {
      position: relative; z-index: 1;
      width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: var(--glow), 0 8px 32px rgba(0,0,0,0.4);
      padding: 44px 40px 36px;
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    /* 卡片顶部光线 */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    .login-logo {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(14,165,233,0.2));
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 24px rgba(0,212,255,0.15);
      animation: logo-pulse 3s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%, 100% { box-shadow: 0 0 24px rgba(0,212,255,0.15); }
      50%      { box-shadow: 0 0 36px rgba(0,212,255,0.3); }
    }
    .login-logo i { font-size: 30px; color: var(--primary); }

    .login-title {
      font-size: 22px; font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    /* === 表单 === */
    .form-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 13px; font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; height: 44px;
      padding: 0 14px 0 40px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }
    .form-group input::placeholder { color: #4b5e7a; }
    .form-group .input-icon {
      position: absolute;
      left: 14px; bottom: 13px;
      color: #4b5e7a;
      font-size: 14px;
      transition: color 0.2s;
    }
    .form-group input:focus + .input-icon,
    .form-group input:focus ~ .input-icon { color: var(--primary); }

    /* === 记住密码 开关 === */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .toggle-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .toggle-wrap span {
      font-size: 13px; color: var(--text-dim);
    }
    .toggle-track {
      width: 40px; height: 22px;
      background: rgba(30,50,80,0.8);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 11px;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: #4b5e7a;
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }
    .toggle-wrap.active .toggle-track {
      background: rgba(0,212,255,0.25);
      border-color: var(--primary);
    }
    .toggle-wrap.active .toggle-track::after {
      transform: translateX(18px);
      background: var(--primary);
      box-shadow: 0 0 8px rgba(0,212,255,0.5);
    }

    /* === 登录按钮 === */
    .login-btn {
      width: 100%; height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 4px;
    }
    .login-btn:hover {
      opacity: 0.92;
      box-shadow: 0 0 20px rgba(0,212,255,0.35);
    }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

    /* === 错误信息 === */
    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: var(--radius);
      color: #f87171;
      font-size: 13px;
      text-align: left;
    }
    .error-msg i { margin-right: 6px; }

    /* === 底部信息 === */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      line-height: 1.8;
    }
    .login-footer .org-name {
      font-weight: 600;
      color: var(--primary);
      font-size: 14px;
      letter-spacing: 2px;
    }
    .login-footer .version {
      color: #4b5e7a;
      font-size: 11px;
    }
    .login-footer .doc-links {
      margin-top: 4px;
    }
    .login-footer .doc-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }
    .login-footer .doc-links a:hover {
      color: var(--primary);
    }
    .login-footer .doc-links .sep {
      margin: 0 10px;
      color: rgba(0,212,255,0.2);
    }
  </style>
</head>
<body>

  <!-- 动态背景 -->
  <div class="bg-layer">
    <canvas id="bgCanvas"></canvas>
  </div>
  <div class="radial-glow glow-1"></div>
  <div class="radial-glow glow-2"></div>

  <div class="login-card">
    <div class="login-logo"><i class="fas fa-shield-halved"></i></div>
    <div class="login-title">重点人管控系统</div>
    <div class="login-subtitle">请使用账号密码登录</div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required autofocus>
        <i class="fas fa-user input-icon"></i>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
        <i class="fas fa-lock input-icon"></i>
      </div>
      <div class="remember-row">
        <div class="toggle-wrap" id="rememberToggle">
          <div class="toggle-track"></div>
          <span>记住密码</span>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">登 录</button>
    </form>
    <div class="error-msg" id="errorMsg"><i class="fas fa-circle-exclamation"></i><span id="errorText"></span></div>
    <div class="login-footer">
      <div class="org-name">贺州市公安局</div>
      <div class="version">版本号: 1.2..4.20260423_base</div>
      <div class="doc-links">
        <a href="/static/docs/操作手册.docx" download><i class="fas fa-book"></i> 操作手册</a>
        <span class="sep">|</span>
        <a href="/static/docs/处置流程.docx" download><i class="fas fa-sitemap"></i> 处置流程</a>
      </div>
    </div>
  </div>

  <script>
    /* === 记住密码切换 === */
    const rememberToggle = document.getElementById('rememberToggle');
    if (localStorage.getItem('remember_password') === 'true') {
      rememberToggle.classList.add('active');
    }
    rememberToggle.addEventListener('click', function() {
      this.classList.toggle('active');
      localStorage.setItem('remember_password', this.classList.contains('active'));
    });

    /* === 自动填充记住的账号密码 === */
    if (localStorage.getItem('remember_password') === 'true') {
      const saved = localStorage.getItem('saved_credentials');
      if (saved) {
        try {
          const cred = JSON.parse(saved);
          document.getElementById('username').value = cred.username || '';
          document.getElementById('password').value = cred.password || '';
        } catch {}
      }
    }

    /* === 已登录跳转 === */
    if (localStorage.getItem('access_token')) {
      fetch('/api/users/me', {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
      }).then(res => {
        if (res.ok) {
          window.location.href = '/';
        } else {
          localStorage.removeItem('access_token');
          localStorage.removeItem('user_info');
        }
      }).catch(() => {
        localStorage.removeItem('access_token');
        localStorage.removeItem('user_info');
      });
    }

    /* === 登录逻辑 === */
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const btn = document.getElementById('loginBtn');

      if (!username || !password) {
        errorText.textContent = '请输入用户名和密码';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.access_token) {
          localStorage.setItem('access_token', data.access_token);
          // 记住密码
          if (localStorage.getItem('remember_password') === 'true') {
            localStorage.setItem('saved_credentials', JSON.stringify({ username, password }));
          } else {
            localStorage.removeItem('saved_credentials');
          }
          // 获取用户信息
          try {
            const meRes = await fetch('/api/users/me', {
              headers: { 'Authorization': `Bearer ${data.access_token}` }
            });
            if (meRes.ok) {
              const meData = await meRes.json();
              localStorage.setItem('user_info', JSON.stringify(meData.data));
            }
          } catch { /* ignore */ }
          window.location.href = '/';
        } else {
          errorText.textContent = data.message || data.detail || '用户名或密码错误';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorText.textContent = '网络错误，请重试';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });

    /* === 背景 Canvas 动画：网格 + 粒子 === */
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [], mouse = { x: -9999, y: -9999 };

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // 鼠标追踪
      document.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      // 初始化粒子
      const PARTICLE_COUNT = 80;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 1.5 + 0.5,
          alpha: Math.random() * 0.5 + 0.2
        });
      }

      function drawGrid() {
        const gap = 60;
        ctx.strokeStyle = 'rgba(0,212,255,0.04)';
        ctx.lineWidth = 0.5;
        for (let x = 0; x < w; x += gap) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, h);
          ctx.stroke();
        }
        for (let y = 0; y < h; y += gap) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }
      }

      function drawParticles() {
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,212,255,${p.alpha})`;
          ctx.fill();
        });

        // 粒子连线
        const maxDist = 120;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < maxDist) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(0,212,255,${0.1 * (1 - dist / maxDist)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
          // 鼠标连线
          const mdx = particles[i].x - mouse.x;
          const mdy = particles[i].y - mouse.y;
          const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mdist < 160) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(0,212,255,${0.2 * (1 - mdist / 160)})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, w, h);
        drawGrid();
        drawParticles();
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
